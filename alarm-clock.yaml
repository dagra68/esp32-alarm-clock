esphome:
  name: alarm-clock
  friendly_name: "Wecker"
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Wecker-Fallback"
    password: !secret fallback_password

i2c:
  sda: GPIO8
  scl: GPIO48

xl9535:
  - id: xl9535_hub
    address: 0x20

spi:
  - id: lcd_spi
    clk_pin:
      xl9535: xl9535_hub
      number: 5
    mosi_pin:
      xl9535: xl9535_hub
      number: 4
    interface: software

display:
  - platform: mipi_rgb
    model: T-RGB-2.1
    id: my_display
    auto_clear_enabled: false
    update_interval: never
    hsync_pin: GPIO47
    show_test_card: true
    reset_pin:
      xl9535: xl9535_hub
      number: 6
    enable_pin:
      xl9535: xl9535_hub
      number: 2

touchscreen:
  - platform: ft5x06
    id: my_touchscreen
    interrupt_pin: GPIO1

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO46
    frequency: 1000Hz
  - platform: ledc
    id: buzzer_output
    pin: GPIO38
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    default_transition_length: 0.5s
    restore_mode: ALWAYS_ON

globals:
  - id: alarm_hour
    type: int
    restore_value: yes
    initial_value: '7'
  - id: alarm_minute
    type: int
    restore_value: yes
    initial_value: '0'
  - id: alarm_enabled
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: alarm_ringing
    type: bool
    restore_value: no
    initial_value: 'false'

rtttl:
  output: buzzer_output
  id: alarm_buzzer
  gain: 70%
  on_finished_playback:
    - if:
        condition:
          lambda: 'return id(alarm_ringing);'
        then:
          - delay: 15s
          - rtttl.play: 'Reveille:d=4,o=5,b=120:8g,8g,8g,8c,8e,8g,2c6,8e,8g,2c6,8e,8g,8c6,8e6,8d6,8c6,8d6,8e6,8c6,8g,8e,2c'

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Berlin"
    servers:
      - 0.de.pool.ntp.org
      - 1.de.pool.ntp.org
      - 2.de.pool.ntp.org
    on_time_sync:
      then:
        - logger.log: "NTP-Zeit synchronisiert"

lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  buffer_size: 25%
  pages:
    - id: digital_clock_page
      widgets:
        - label:
            id: time_label
            align: CENTER
            text_font: montserrat_48
            text_color: 0xFFFFFF
            text:
              time_format: "%H:%M"
              time: sntp_time
        - label:
            id: date_label
            align: CENTER
            y: 40
            text_font: montserrat_14
            text_color: 0xCCCCCC
            text:
              time_format: "%A, %d.%m.%Y"
              time: sntp_time
