esphome:
  name: alarm-clock
  friendly_name: "Wecker"
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Wecker-Fallback"
    password: !secret fallback_password

i2c:
  sda: GPIO8
  scl: GPIO48

xl9535:
  - id: xl9535_hub
    address: 0x20

spi:
  - id: lcd_spi
    clk_pin:
      xl9535: xl9535_hub
      number: 5
    mosi_pin:
      xl9535: xl9535_hub
      number: 4
    interface: software

display:
  - platform: mipi_rgb
    model: T-RGB-2.1
    id: my_display
    auto_clear_enabled: false
    update_interval: never
    hsync_pin: GPIO47
    show_test_card: true
    reset_pin:
      xl9535: xl9535_hub
      number: 6
    enable_pin:
      xl9535: xl9535_hub
      number: 2

touchscreen:
  - platform: ft5x06
    id: my_touchscreen
    address: 0x38
    interrupt_pin: GPIO1

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO46
    frequency: 1000Hz
  - platform: ledc
    id: buzzer_output
    pin: GPIO38
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    default_transition_length: 0.5s
    restore_mode: ALWAYS_ON

switch:
  - platform: template
    name: "Alarm aktiv"
    id: alarm_enabled_switch
    icon: mdi:alarm
    restore_mode: DISABLED
    lambda: |-
      return id(alarm_enabled);
    turn_on_action:
      - globals.set:
          id: alarm_enabled
          value: 'true'
      - lvgl.label.update:
          id: alarm_status_label
          text_color: 0xFFAA00
    turn_off_action:
      - globals.set:
          id: alarm_enabled
          value: 'false'
      - lvgl.label.update:
          id: alarm_status_label
          text_color: 0x666666

datetime:
  - platform: template
    name: "Alarmzeit"
    id: alarm_time
    type: time
    icon: mdi:alarm
    lambda: |-
      ESPTime t{};
      t.hour = id(alarm_hour);
      t.minute = id(alarm_minute);
      t.second = 0;
      return t;
    set_action:
      - globals.set:
          id: alarm_hour
          value: !lambda 'return (int)x.hour;'
      - globals.set:
          id: alarm_minute
          value: !lambda 'return (int)x.minute;'
      - lvgl.label.update:
          id: alarm_status_label
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), LV_SYMBOL_BELL " %02d:%02d",
                     id(alarm_hour), id(alarm_minute));
            return buf;
      - lvgl.label.update:
          id: hour_value_label
          text: !lambda |-
            static char buf[4];
            snprintf(buf, sizeof(buf), "%02d", id(alarm_hour));
            return buf;
      - lvgl.label.update:
          id: minute_value_label
          text: !lambda |-
            static char buf[4];
            snprintf(buf, sizeof(buf), "%02d", id(alarm_minute));
            return buf;

globals:
  - id: alarm_hour
    type: int
    restore_value: yes
    initial_value: '7'
  - id: alarm_minute
    type: int
    restore_value: yes
    initial_value: '0'
  - id: alarm_enabled
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: alarm_ringing
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: alarm_melody_name
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '"Reveille"'
  - id: bg_color_hex
    type: int
    restore_value: yes
    initial_value: '0xFF69B4'

select:
  - platform: template
    name: "Alarm Melodie"
    id: alarm_melody_select
    icon: mdi:music-note
    options:
      - "Reveille"
      - "Entertainer"
      - "Frere Jacques"
    initial_option: "Reveille"
    optimistic: true
    set_action:
      - globals.set:
          id: alarm_melody_name
          value: !lambda 'return x;'

  - platform: template
    name: "Zifferblatt"
    id: clock_face_select
    icon: mdi:clock-outline
    options:
      - "Digital"
      - "Analog"
    initial_option: "Analog"
    optimistic: true
    set_action:
      - if:
          condition:
            lambda: 'return x == "Analog";'
          then:
            - script.execute: analog_time_update
            - lvgl.page.show: analog_clock_page
          else:
            - lvgl.page.show: digital_clock_page

  - platform: template
    name: "Hintergrundfarbe"
    id: bg_color_select
    icon: mdi:palette
    options:
      - "Pink"
      - "Weiss"
      - "Schwarz"
      - "Dunkelblau"
    initial_option: "Pink"
    optimistic: true
    set_action:
      - lambda: |-
          if (x == "Pink") id(bg_color_hex) = 0xFF69B4;
          else if (x == "Weiss") id(bg_color_hex) = 0xFFFFFF;
          else if (x == "Schwarz") id(bg_color_hex) = 0x000000;
          else if (x == "Dunkelblau") id(bg_color_hex) = 0x1A1A2E;
      - lvgl.widget.update:
          id: analog_clock_bg
          bg_color: !lambda 'return lv_color_hex(id(bg_color_hex));'

rtttl:
  output: buzzer_output
  id: alarm_buzzer
  gain: 70%
  on_finished_playback:
    - if:
        condition:
          lambda: 'return id(alarm_ringing);'
        then:
          - delay: 15s
          - rtttl.play: !lambda |-
              if (id(alarm_melody_name) == "Entertainer")
                return std::string("Entertainer:d=4,o=5,b=140:8d,8d#,8e,c,8e,c,8e,2b.,8c6,8c6,8c6,2a.,8b.,8a,8g,8a,8b,a,8a.,8g,8f#,8e,8d,2g,p");
              if (id(alarm_melody_name) == "Frere Jacques")
                return std::string("FrereJacques:d=4,o=5,b=126:c,d,e,c,c,d,e,c,e,f,2g,e,f,2g");
              return std::string("Reveille:d=4,o=5,b=120:8g,8g,8g,8c,8e,8g,2c6,8e,8g,2c6,8e,8g,8c6,8e6,8d6,8c6,8d6,8e6,8c6,8g,8e,2c");

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
      ignore_strapping_warning: true
    id: snooze_button
    name: "Snooze Button"
    internal: true
    on_press:
      - if:
          condition:
            lambda: 'return id(alarm_ringing);'
          then:
            - script.execute: snooze_action

script:
  - id: alarm_timeout_script
    mode: restart
    then:
      - delay: 5min
      - lambda: |-
          id(alarm_ringing) = false;
          id(alarm_enabled) = false;
      - rtttl.stop:
      - lvgl.page.show: digital_clock_page

  - id: snooze_action
    mode: restart
    then:
      - rtttl.stop:
      - lambda: 'id(alarm_ringing) = false;'
      - lvgl.page.show: digital_clock_page
      - delay: 5min
      - lambda: 'id(alarm_ringing) = true;'
      - rtttl.play: !lambda |-
          if (id(alarm_melody_name) == "Entertainer")
            return std::string("Entertainer:d=4,o=5,b=140:8d,8d#,8e,c,8e,c,8e,2b.,8c6,8c6,8c6,2a.,8b.,8a,8g,8a,8b,a,8a.,8g,8f#,8e,8d,2g,p");
          if (id(alarm_melody_name) == "Frere Jacques")
            return std::string("FrereJacques:d=4,o=5,b=126:c,d,e,c,c,d,e,c,e,f,2g,e,f,2g");
          return std::string("Reveille:d=4,o=5,b=120:8g,8g,8g,8c,8e,8g,2c6,8e,8g,2c6,8e,8g,8c6,8e6,8d6,8c6,8d6,8e6,8c6,8g,8e,2c");
      - lvgl.page.show: alarm_ringing_page
      - script.execute: alarm_timeout_script

  - id: alarm_stop_action
    mode: single
    then:
      - rtttl.stop:
      - lambda: |-
          id(alarm_ringing) = false;
          id(alarm_enabled) = false;
      - lvgl.page.show: digital_clock_page

  - id: analog_time_update
    then:
      - lvgl.indicator.update:
          id: minute_hand
          value: !lambda 'return id(sntp_time).now().minute;'
      - lvgl.indicator.update:
          id: hour_hand
          value: !lambda |-
            auto now = id(sntp_time).now();
            return std::fmod(now.hour, 12) * 60 + now.minute;

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Berlin"
    servers:
      - 0.de.pool.ntp.org
      - 1.de.pool.ntp.org
      - 2.de.pool.ntp.org
    on_time_sync:
      then:
        - logger.log: "NTP-Zeit synchronisiert"
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lambda: |-
              if (id(alarm_ringing)) return;
              auto now = id(sntp_time).now();
              if (!now.is_valid()) return;
              bool is_weekday = (now.day_of_week >= 2 && now.day_of_week <= 6);
              if (id(alarm_enabled) && is_weekday &&
                  now.hour == id(alarm_hour) && now.minute == id(alarm_minute)) {
                id(alarm_ringing) = true;
                id(alarm_timeout_script).execute();
              }
          - if:
              condition:
                lambda: 'return id(alarm_ringing);'
              then:
                - rtttl.play: !lambda |-
                    if (id(alarm_melody_name) == "Entertainer")
                      return std::string("Entertainer:d=4,o=5,b=140:8d,8d#,8e,c,8e,c,8e,2b.,8c6,8c6,8c6,2a.,8b.,8a,8g,8a,8b,a,8a.,8g,8f#,8e,8d,2g,p");
                    if (id(alarm_melody_name) == "Frere Jacques")
                      return std::string("FrereJacques:d=4,o=5,b=126:c,d,e,c,c,d,e,c,e,f,2g,e,f,2g");
                    return std::string("Reveille:d=4,o=5,b=120:8g,8g,8g,8c,8e,8g,2c6,8e,8g,2c6,8e,8g,8c6,8e6,8d6,8c6,8d6,8e6,8c6,8g,8e,2c");
                - lvgl.page.show: alarm_ringing_page
          - if:
              condition:
                lvgl.page.is_showing: analog_clock_page
              then:
                - script.execute: analog_time_update

lvgl:
  displays:
    - my_display
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 600ms
      long_press_repeat_time: 65535ms
  buffer_size: 25%
  pages:
    - id: digital_clock_page
      bg_color: 0xFF69B4
      widgets:
        - label:
            id: time_label
            align: CENTER
            text_font: montserrat_48
            text_color: 0xFFFFFF
            text:
              time_format: "%H:%M"
              time: sntp_time
        - label:
            id: date_label
            align: CENTER
            y: 40
            text_font: montserrat_14
            text_color: 0xCCCCCC
            text:
              time_format: "%A, %d.%m.%Y"
              time: sntp_time
        - button:
            id: alarm_status_btn
            width: 200
            height: 60
            align: CENTER
            y: 80
            bg_color: 0x000000
            border_width: 0
            shadow_width: 0
            on_short_click:
              - lambda: 'id(alarm_enabled) = !id(alarm_enabled);'
              - lvgl.label.update:
                  id: alarm_status_label
                  text_color: !lambda |-
                    return id(alarm_enabled) ? lv_color_hex(0xFFAA00) : lv_color_hex(0x666666);
            on_long_press:
              - lvgl.page.show: alarm_settings_page
            widgets:
              - label:
                  id: alarm_status_label
                  align: CENTER
                  text_font: montserrat_14
                  text_color: 0x666666
                  text: !lambda |-
                    static char buf[16];
                    snprintf(buf, sizeof(buf), LV_SYMBOL_BELL " %02d:%02d",
                             id(alarm_hour), id(alarm_minute));
                    return buf;

    - id: alarm_settings_page
      bg_color: 0xFF69B4
      widgets:
        - label:
            id: settings_header_label
            align: TOP_MID
            y: 100
            text_font: montserrat_24
            text_color: 0xFFAA00
            text: "Alarm einstellen"

        - label:
            id: hour_value_label
            align: CENTER
            x: -80
            y: -10
            text_font: montserrat_36
            text_color: 0xFFFFFF
            text: !lambda |-
              static char buf[4];
              snprintf(buf, sizeof(buf), "%02d", id(alarm_hour));
              return buf;

        - label:
            id: colon_label
            align: CENTER
            x: 0
            y: -10
            text_font: montserrat_36
            text_color: 0xCCCCCC
            text: ":"

        - label:
            id: minute_value_label
            align: CENTER
            x: 80
            y: -10
            text_font: montserrat_36
            text_color: 0xFFFFFF
            text: !lambda |-
              static char buf[4];
              snprintf(buf, sizeof(buf), "%02d", id(alarm_minute));
              return buf;

        - button:
            id: hour_plus_btn
            align: CENTER
            x: -80
            y: -70
            width: 80
            height: 60
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lambda: 'id(alarm_hour) = (id(alarm_hour) + 1) % 24;'
              - lvgl.label.update:
                  id: hour_value_label
                  text: !lambda |-
                    static char buf[4];
                    snprintf(buf, sizeof(buf), "%02d", id(alarm_hour));
                    return buf;
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "+"

        - button:
            id: hour_minus_btn
            align: CENTER
            x: -80
            y: 50
            width: 80
            height: 60
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lambda: 'id(alarm_hour) = (id(alarm_hour) + 23) % 24;'
              - lvgl.label.update:
                  id: hour_value_label
                  text: !lambda |-
                    static char buf[4];
                    snprintf(buf, sizeof(buf), "%02d", id(alarm_hour));
                    return buf;
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "-"

        - button:
            id: minute_plus_btn
            align: CENTER
            x: 80
            y: -70
            width: 80
            height: 60
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lambda: 'id(alarm_minute) = (id(alarm_minute) + 5) % 60;'
              - lvgl.label.update:
                  id: minute_value_label
                  text: !lambda |-
                    static char buf[4];
                    snprintf(buf, sizeof(buf), "%02d", id(alarm_minute));
                    return buf;
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "+"

        - button:
            id: minute_minus_btn
            align: CENTER
            x: 80
            y: 50
            width: 80
            height: 60
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lambda: 'id(alarm_minute) = (id(alarm_minute) + 55) % 60;'
              - lvgl.label.update:
                  id: minute_value_label
                  text: !lambda |-
                    static char buf[4];
                    snprintf(buf, sizeof(buf), "%02d", id(alarm_minute));
                    return buf;
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "-"

        - button:
            id: settings_back_btn
            align: BOTTOM_MID
            y: -60
            width: 200
            height: 56
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lvgl.label.update:
                  id: alarm_status_label
                  text: !lambda |-
                    static char buf[16];
                    snprintf(buf, sizeof(buf), LV_SYMBOL_BELL " %02d:%02d",
                             id(alarm_hour), id(alarm_minute));
                    return buf;
              - lvgl.page.show: digital_clock_page
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "Zurueck"

    - id: alarm_ringing_page
      widgets:
        - label:
            id: ringing_header_label
            align: CENTER
            y: -100
            text_font: montserrat_48
            text_color: 0xFFFFFF
            text: "ALARM"

        - label:
            id: ringing_time_label
            align: CENTER
            y: -40
            text_font: montserrat_36
            text_color: 0xFFAA00
            text: !lambda |-
              static char buf[8];
              snprintf(buf, sizeof(buf), "%02d:%02d", id(alarm_hour), id(alarm_minute));
              return buf;

        - button:
            id: snooze_btn
            align: CENTER
            x: -90
            y: 80
            width: 160
            height: 80
            bg_color: 0xFFAA00
            border_width: 0
            on_short_click:
              - script.execute: snooze_action
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0x000000
                  text: "Snooze 5min"

        - button:
            id: stopp_btn
            align: CENTER
            x: 90
            y: 80
            width: 140
            height: 80
            bg_color: 0xFF3333
            border_width: 0
            on_short_click:
              - script.execute: alarm_stop_action
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "Stopp"

    - id: analog_clock_page
      widgets:
        - obj:
            id: analog_clock_bg
            width: 480
            height: 480
            align: CENTER
            bg_color: 0xFF69B4
            border_width: 0
            pad_all: 0
            widgets:
              - meter:
                  id: analog_meter
                  height: 480
                  width: 480
                  align: CENTER
                  bg_opa: TRANSP
                  border_width: 0
                  text_color: 0x000000
                  text_font: montserrat_24
                  scales:
                    - range_from: 0
                      range_to: 60
                      angle_range: 360
                      rotation: 270
                      ticks:
                        width: 1
                        count: 61
                        length: 10
                        color: 0x000000
                      indicators:
                        - line:
                            id: minute_hand
                            width: 3
                            color: 0x000000
                            r_mod: -4
                            value: 0
                    - range_from: 1
                      range_to: 12
                      angle_range: 330
                      rotation: 300
                      ticks:
                        width: 1
                        count: 12
                        length: 1
                        major:
                          stride: 1
                          width: 4
                          length: 10
                          color: 0x000000
                          label_gap: 14
                    - range_from: 0
                      range_to: 720
                      angle_range: 360
                      rotation: 270
                      ticks:
                        count: 0
                      indicators:
                        - line:
                            id: hour_hand
                            width: 5
                            color: 0x000000
                            r_mod: -50
                            value: 0
