esphome:
  name: alarm-clock
  friendly_name: "Wecker"
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Wecker-Fallback"
    password: !secret fallback_password

i2c:
  sda: GPIO8
  scl: GPIO48

xl9535:
  - id: xl9535_hub
    address: 0x20

spi:
  - id: lcd_spi
    clk_pin:
      xl9535: xl9535_hub
      number: 5
    mosi_pin:
      xl9535: xl9535_hub
      number: 4
    interface: software

display:
  - platform: mipi_rgb
    model: T-RGB-2.1
    id: my_display
    auto_clear_enabled: false
    update_interval: never
    hsync_pin: GPIO47
    show_test_card: true
    reset_pin:
      xl9535: xl9535_hub
      number: 6
    enable_pin:
      xl9535: xl9535_hub
      number: 2

touchscreen:
  - platform: ft5x06
    id: my_touchscreen
    interrupt_pin: GPIO1

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO46
    frequency: 1000Hz
  - platform: ledc
    id: buzzer_output
    pin: GPIO38
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    default_transition_length: 0.5s
    restore_mode: ALWAYS_ON

switch:
  - platform: template
    name: "Alarm aktiv"
    id: alarm_enabled_switch
    icon: mdi:alarm
    restore_mode: DISABLED
    lambda: |-
      return id(alarm_enabled);
    turn_on_action:
      - globals.set:
          id: alarm_enabled
          value: 'true'
      - lvgl.label.update:
          id: alarm_status_label
          text_color: 0xFFAA00
    turn_off_action:
      - globals.set:
          id: alarm_enabled
          value: 'false'
      - lvgl.label.update:
          id: alarm_status_label
          text_color: 0x666666

globals:
  - id: alarm_hour
    type: int
    restore_value: yes
    initial_value: '7'
  - id: alarm_minute
    type: int
    restore_value: yes
    initial_value: '0'
  - id: alarm_enabled
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: alarm_ringing
    type: bool
    restore_value: no
    initial_value: 'false'

rtttl:
  output: buzzer_output
  id: alarm_buzzer
  gain: 70%
  on_finished_playback:
    - if:
        condition:
          lambda: 'return id(alarm_ringing);'
        then:
          - delay: 15s
          - rtttl.play: 'Reveille:d=4,o=5,b=120:8g,8g,8g,8c,8e,8g,2c6,8e,8g,2c6,8e,8g,8c6,8e6,8d6,8c6,8d6,8e6,8c6,8g,8e,2c'

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
      ignore_strapping_warning: true
    id: snooze_button
    name: "Snooze Button"
    internal: true
    on_press:
      - if:
          condition:
            lambda: 'return id(alarm_ringing);'
          then:
            - script.execute: snooze_action

script:
  - id: alarm_timeout_script
    mode: restart
    then:
      - delay: 5min
      - lambda: |-
          id(alarm_ringing) = false;
          id(alarm_enabled) = false;
      - rtttl.stop:
      - lvgl.page.show: digital_clock_page

  - id: snooze_action
    mode: restart
    then:
      - rtttl.stop:
      - lambda: 'id(alarm_ringing) = false;'
      - lvgl.page.show: digital_clock_page
      - delay: 5min
      - lambda: 'id(alarm_ringing) = true;'
      - rtttl.play: 'Reveille:d=4,o=5,b=120:8g,8g,8g,8c,8e,8g,2c6,8e,8g,2c6,8e,8g,8c6,8e6,8d6,8c6,8d6,8e6,8c6,8g,8e,2c'
      - lvgl.page.show: alarm_ringing_page
      - script.execute: alarm_timeout_script

  - id: alarm_stop_action
    mode: single
    then:
      - rtttl.stop:
      - lambda: |-
          id(alarm_ringing) = false;
          id(alarm_enabled) = false;
      - lvgl.page.show: digital_clock_page

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Berlin"
    servers:
      - 0.de.pool.ntp.org
      - 1.de.pool.ntp.org
      - 2.de.pool.ntp.org
    on_time_sync:
      then:
        - logger.log: "NTP-Zeit synchronisiert"
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lambda: |-
              if (id(alarm_ringing)) return;
              auto now = id(sntp_time).now();
              if (!now.is_valid()) return;
              bool is_weekday = (now.day_of_week >= 2 && now.day_of_week <= 6);
              if (id(alarm_enabled) && is_weekday &&
                  now.hour == id(alarm_hour) && now.minute == id(alarm_minute)) {
                id(alarm_ringing) = true;
                id(alarm_timeout_script).execute();
              }
          - if:
              condition:
                lambda: 'return id(alarm_ringing);'
              then:
                - rtttl.play: 'Reveille:d=4,o=5,b=120:8g,8g,8g,8c,8e,8g,2c6,8e,8g,2c6,8e,8g,8c6,8e6,8d6,8c6,8d6,8e6,8c6,8g,8e,2c'
                - lvgl.page.show: alarm_ringing_page

lvgl:
  displays:
    - my_display
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 600ms
      long_press_repeat_time: 65535ms
  buffer_size: 25%
  pages:
    - id: digital_clock_page
      widgets:
        - label:
            id: time_label
            align: CENTER
            text_font: montserrat_48
            text_color: 0xFFFFFF
            text:
              time_format: "%H:%M"
              time: sntp_time
        - label:
            id: date_label
            align: CENTER
            y: 40
            text_font: montserrat_14
            text_color: 0xCCCCCC
            text:
              time_format: "%A, %d.%m.%Y"
              time: sntp_time
        - button:
            id: alarm_status_btn
            width: 200
            height: 60
            align: CENTER
            y: 80
            bg_color: 0x000000
            border_width: 0
            shadow_width: 0
            on_short_click:
              - lambda: 'id(alarm_enabled) = !id(alarm_enabled);'
              - lvgl.label.update:
                  id: alarm_status_label
                  text_color: !lambda |-
                    return id(alarm_enabled) ? lv_color_hex(0xFFAA00) : lv_color_hex(0x666666);
            on_long_press:
              - lvgl.page.show: alarm_settings_page
            widgets:
              - label:
                  id: alarm_status_label
                  align: CENTER
                  text_font: montserrat_14
                  text_color: 0x666666
                  text: !lambda |-
                    static char buf[16];
                    snprintf(buf, sizeof(buf), LV_SYMBOL_BELL " %02d:%02d",
                             id(alarm_hour), id(alarm_minute));
                    return buf;

    - id: alarm_settings_page
      widgets:
        - label:
            id: settings_header_label
            align: TOP_MID
            y: 100
            text_font: montserrat_24
            text_color: 0xFFAA00
            text: "Alarm einstellen"

        - label:
            id: hour_value_label
            align: CENTER
            x: -80
            y: -10
            text_font: montserrat_36
            text_color: 0xFFFFFF
            text: !lambda |-
              static char buf[4];
              snprintf(buf, sizeof(buf), "%02d", id(alarm_hour));
              return buf;

        - label:
            id: colon_label
            align: CENTER
            x: 0
            y: -10
            text_font: montserrat_36
            text_color: 0xCCCCCC
            text: ":"

        - label:
            id: minute_value_label
            align: CENTER
            x: 80
            y: -10
            text_font: montserrat_36
            text_color: 0xFFFFFF
            text: !lambda |-
              static char buf[4];
              snprintf(buf, sizeof(buf), "%02d", id(alarm_minute));
              return buf;

        - button:
            id: hour_plus_btn
            align: CENTER
            x: -80
            y: -70
            width: 80
            height: 60
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lambda: 'id(alarm_hour) = (id(alarm_hour) + 1) % 24;'
              - lvgl.label.update:
                  id: hour_value_label
                  text: !lambda |-
                    static char buf[4];
                    snprintf(buf, sizeof(buf), "%02d", id(alarm_hour));
                    return buf;
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "+"

        - button:
            id: hour_minus_btn
            align: CENTER
            x: -80
            y: 50
            width: 80
            height: 60
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lambda: 'id(alarm_hour) = (id(alarm_hour) + 23) % 24;'
              - lvgl.label.update:
                  id: hour_value_label
                  text: !lambda |-
                    static char buf[4];
                    snprintf(buf, sizeof(buf), "%02d", id(alarm_hour));
                    return buf;
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "-"

        - button:
            id: minute_plus_btn
            align: CENTER
            x: 80
            y: -70
            width: 80
            height: 60
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lambda: 'id(alarm_minute) = (id(alarm_minute) + 5) % 60;'
              - lvgl.label.update:
                  id: minute_value_label
                  text: !lambda |-
                    static char buf[4];
                    snprintf(buf, sizeof(buf), "%02d", id(alarm_minute));
                    return buf;
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "+"

        - button:
            id: minute_minus_btn
            align: CENTER
            x: 80
            y: 50
            width: 80
            height: 60
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lambda: 'id(alarm_minute) = (id(alarm_minute) + 55) % 60;'
              - lvgl.label.update:
                  id: minute_value_label
                  text: !lambda |-
                    static char buf[4];
                    snprintf(buf, sizeof(buf), "%02d", id(alarm_minute));
                    return buf;
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "-"

        - button:
            id: settings_back_btn
            align: BOTTOM_MID
            y: -60
            width: 200
            height: 56
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lvgl.label.update:
                  id: alarm_status_label
                  text: !lambda |-
                    static char buf[16];
                    snprintf(buf, sizeof(buf), LV_SYMBOL_BELL " %02d:%02d",
                             id(alarm_hour), id(alarm_minute));
                    return buf;
              - lvgl.page.show: digital_clock_page
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "Zurueck"

    - id: alarm_ringing_page
      widgets:
        - label:
            id: ringing_header_label
            align: CENTER
            y: -100
            text_font: montserrat_48
            text_color: 0xFFFFFF
            text: "ALARM"

        - label:
            id: ringing_time_label
            align: CENTER
            y: -40
            text_font: montserrat_36
            text_color: 0xFFAA00
            text: !lambda |-
              static char buf[8];
              snprintf(buf, sizeof(buf), "%02d:%02d", id(alarm_hour), id(alarm_minute));
              return buf;

        - button:
            id: snooze_btn
            align: CENTER
            x: -90
            y: 80
            width: 160
            height: 80
            bg_color: 0xFFAA00
            border_width: 0
            on_short_click:
              - script.execute: snooze_action
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0x000000
                  text: "Snooze 5min"

        - button:
            id: stopp_btn
            align: CENTER
            x: 90
            y: 80
            width: 140
            height: 80
            bg_color: 0xFF3333
            border_width: 0
            on_short_click:
              - script.execute: alarm_stop_action
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "Stopp"
