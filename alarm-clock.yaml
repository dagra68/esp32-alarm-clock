# ============================================================
#  ESP32 Alarm Clock
#  Hardware: LilyGo T-RGB 2.1" (rund) mit ESP32-S3
#  Framework: ESPHome (ESP-IDF)
# ============================================================

esphome:
  name: alarm-clock
  friendly_name: "Wecker"
  on_boot:
    priority: -100   # nach vollständiger Initialisierung starten
    then:
      - lvgl.page.show: analog_clock_page
      - script.execute: analog_time_update
      - script.execute: hand_style_apply
      - script.execute: display_sleep_timer
      # Alarm-Labels mit gespeicherten Werten befüllen
      - lvgl.label.update:
          id: hour_value_label
          text: !lambda |-
            static char buf[4];
            snprintf(buf, sizeof(buf), "%02d", id(alarm_hour));
            return buf;
      - lvgl.label.update:
          id: minute_value_label
          text: !lambda |-
            static char buf[4];
            snprintf(buf, sizeof(buf), "%02d", id(alarm_minute));
            return buf;
      - select.set:
          id: alarm_melody_select
          option: !lambda 'return id(alarm_melody_name);'
      - if:
          condition:
            lambda: 'return !id(weekday_only);'
          then:
            - lvgl.label.update:
                id: weekday_btn_label
                text: "AUS"
            - lvgl.widget.update:
                id: weekday_toggle_btn
                bg_color: 0x666666
      - select.set:
          id: bg_color_select
          option: !lambda |-
            if (id(bg_color_hex) == 0xFFFFFF) return std::string("Weiss");
            if (id(bg_color_hex) == 0x000000) return std::string("Schwarz");
            if (id(bg_color_hex) == 0x1A1A2E) return std::string("Dunkelblau");
            return std::string("Pink");
  platformio_options:
    board_build.flash_mode: dio

# ── Board ──────────────────────────────────────────────────
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

# ── Dienste ────────────────────────────────────────────────
logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Wecker-Fallback"
    password: !secret fallback_password

# ── Hardware-Bus ───────────────────────────────────────────
i2c:
  sda: GPIO8
  scl: GPIO48
  frequency: 400kHz

# IO-Expander für Display-Reset und SPI-Pins
xl9535:
  - id: xl9535_hub
    address: 0x20

# Software-SPI für Display-Konfiguration
spi:
  - id: lcd_spi
    clk_pin:
      xl9535: xl9535_hub
      number: 5
    mosi_pin:
      xl9535: xl9535_hub
      number: 4
    interface: software

# ── Display ────────────────────────────────────────────────
display:
  - platform: mipi_rgb
    model: T-RGB-2.1
    id: my_display
    auto_clear_enabled: false
    update_interval: never   # LVGL übernimmt das Rendering
    hsync_pin: GPIO47
    show_test_card: true
    reset_pin:
      xl9535: xl9535_hub
      number: 6
    enable_pin:
      xl9535: xl9535_hub
      number: 2

# ── Touchscreen ────────────────────────────────────────────
touchscreen:
  - platform: ft5x06
    id: my_touchscreen
    address: 0x38
    interrupt_pin:
      number: GPIO1
      mode: INPUT_PULLUP
    on_touch:
      - if:
          condition:
            lambda: 'return id(display_sleeping);'
          then:
            - lvgl.pause:
            - light.turn_on: backlight
            - globals.set:
                id: display_sleeping
                value: 'false'
            - delay: 300ms
            - lvgl.resume:
      - script.execute: display_sleep_timer

# ── Ausgänge ───────────────────────────────────────────────
output:
  # Backlight per PWM dimmbar
  - platform: ledc
    id: backlight_output
    pin: GPIO46
    frequency: 1000Hz
  # Passiver Buzzer für RTTTL-Melodien (SD-Karten-Pin IO38, nicht verwendet)
  - platform: ledc
    id: buzzer_output
    pin: GPIO38
    frequency: 1000Hz

# ── Licht ──────────────────────────────────────────────────
light:
  - platform: monochromatic
    output: backlight_output
    name: "Display Backlight"
    id: backlight
    default_transition_length: 0.5s
    restore_mode: ALWAYS_ON

# ── Switches (Home Assistant) ──────────────────────────────
switch:
  # Alarm aktivieren/deaktivieren
  - platform: template
    name: "Alarm aktiv"
    id: alarm_enabled_switch
    icon: mdi:alarm
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: |-
      return id(alarm_enabled);
    turn_on_action:
      - globals.set:
          id: alarm_enabled
          value: 'true'
      - lvgl.label.update:
          id: analog_alarm_label
          text: !lambda |-
            static char buf[32];
            snprintf(buf, sizeof(buf), "#FFAA00 " LV_SYMBOL_BELL "# %02d:%02d",
                     id(alarm_hour), id(alarm_minute));
            return buf;
    turn_off_action:
      - globals.set:
          id: alarm_enabled
          value: 'false'
      - lvgl.label.update:
          id: analog_alarm_label
          text: !lambda |-
            static char buf[32];
            snprintf(buf, sizeof(buf), "#000000 " LV_SYMBOL_BELL "# %02d:%02d",
                     id(alarm_hour), id(alarm_minute));
            return buf;

  # Alarm nur Mo–Fr auslösen
  - platform: template
    name: "Nur Mo-Fr"
    id: weekday_only_switch
    icon: mdi:calendar-week
    restore_mode: RESTORE_DEFAULT_ON
    lambda: |-
      return id(weekday_only);
    turn_on_action:
      - globals.set:
          id: weekday_only
          value: 'true'
      - lvgl.label.update:
          id: weekday_label
          text: "Mo-Fr"
      - lvgl.label.update:
          id: weekday_btn_label
          text: "AN"
      - lvgl.widget.update:
          id: weekday_toggle_btn
          bg_color: 0x1A1A2E
    turn_off_action:
      - globals.set:
          id: weekday_only
          value: 'false'
      - lvgl.label.update:
          id: weekday_label
          text: ""
      - lvgl.label.update:
          id: weekday_btn_label
          text: "AUS"
      - lvgl.widget.update:
          id: weekday_toggle_btn
          bg_color: 0x666666

# ── Alarmzeit (Home Assistant Datetime) ───────────────────
datetime:
  - platform: template
    name: "Alarmzeit"
    id: alarm_time
    type: time
    icon: mdi:alarm
    lambda: |-
      ESPTime t{};
      t.hour = id(alarm_hour);
      t.minute = id(alarm_minute);
      t.second = 0;
      return t;
    set_action:
      - globals.set:
          id: alarm_hour
          value: !lambda 'return (int)x.hour;'
      - globals.set:
          id: alarm_minute
          value: !lambda 'return (int)x.minute;'
      - lvgl.label.update:
          id: analog_alarm_label
          text: !lambda |-
            static char buf[32];
            if (id(alarm_enabled)) {
              snprintf(buf, sizeof(buf), "#FFAA00 " LV_SYMBOL_BELL "# %02d:%02d",
                       id(alarm_hour), id(alarm_minute));
            } else {
              snprintf(buf, sizeof(buf), "#000000 " LV_SYMBOL_BELL "# %02d:%02d",
                       id(alarm_hour), id(alarm_minute));
            }
            return buf;
      - lvgl.label.update:
          id: hour_value_label
          text: !lambda |-
            static char buf[4];
            snprintf(buf, sizeof(buf), "%02d", id(alarm_hour));
            return buf;
      - lvgl.label.update:
          id: minute_value_label
          text: !lambda |-
            static char buf[4];
            snprintf(buf, sizeof(buf), "%02d", id(alarm_minute));
            return buf;

# ── Globale Variablen (Flash-persistent) ──────────────────
globals:
  - id: alarm_hour
    type: int
    restore_value: yes
    initial_value: '7'
  - id: alarm_minute
    type: int
    restore_value: yes
    initial_value: '0'
  - id: alarm_enabled
    type: bool
    restore_value: yes
    initial_value: 'false'
  # Laufzeit-Flag: Alarm klingelt gerade
  - id: alarm_ringing
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: alarm_melody_name
    type: std::string
    restore_value: yes
    max_restore_data_length: 64
    initial_value: '"Reveille"'
  - id: bg_color_hex
    type: int
    restore_value: yes
    initial_value: '0xFF69B4'
  - id: weekday_only
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: hand_style_name
    type: std::string
    restore_value: yes
    max_restore_data_length: 32
    initial_value: '"Klassisch"'
  - id: display_sleeping
    type: bool
    restore_value: no
    initial_value: 'false'

# ── Select-Entitäten (Home Assistant) ─────────────────────
select:
  # Alarm-Melodie wählen
  - platform: template
    name: "Alarm Melodie"
    id: alarm_melody_select
    icon: mdi:music-note
    options:
      - "Reveille"
      - "Entertainer"
      - "Frere Jacques"
    initial_option: "Reveille"
    optimistic: true
    set_action:
      - globals.set:
          id: alarm_melody_name
          value: !lambda 'return x;'

  # Zeiger-Design wählen
  - platform: template
    name: "Zeiger Design"
    id: hand_style_select
    icon: mdi:clock-outline
    options:
      - "Klassisch"
      - "Weiss"
      - "Rot"
      - "Gold"
      - "Neon"
    initial_option: "Klassisch"
    optimistic: true
    restore_value: true
    set_action:
      - globals.set:
          id: hand_style_name
          value: !lambda 'return x;'
      - script.execute: hand_style_apply

  # Hintergrundfarbe des Zifferblatts
  - platform: template
    name: "Hintergrundfarbe"
    id: bg_color_select
    icon: mdi:palette
    options:
      - "Pink"
      - "Weiss"
      - "Schwarz"
      - "Dunkelblau"
    initial_option: "Pink"
    optimistic: true
    set_action:
      - lambda: |-
          if (x == "Pink") id(bg_color_hex) = 0xFF69B4;
          else if (x == "Weiss") id(bg_color_hex) = 0xFFFFFF;
          else if (x == "Schwarz") id(bg_color_hex) = 0x000000;
          else if (x == "Dunkelblau") id(bg_color_hex) = 0x1A1A2E;
      - lvgl.widget.update:
          id: analog_clock_bg
          bg_color: !lambda 'return lv_color_hex(id(bg_color_hex));'

# ── RTTTL Buzzer ───────────────────────────────────────────
rtttl:
  output: buzzer_output
  id: alarm_buzzer
  on_finished_playback:
    # Melodie automatisch wiederholen solange Alarm aktiv
    - if:
        condition:
          lambda: 'return id(alarm_ringing);'
        then:
          - delay: 15s
          - rtttl.play: !lambda |-
              if (id(alarm_melody_name) == "Entertainer")
                return std::string("Entertainer:d=4,o=5,b=140:8d,8d#,8e,c,8e,c,8e,2b.,8c6,8c6,8c6,2a.,8b.,8a,8g,8a,8b,a,8a.,8g,8f#,8e,8d,2g,p");
              if (id(alarm_melody_name) == "Frere Jacques")
                return std::string("FrereJacques:d=4,o=5,b=126:c,d,e,c,c,d,e,c,e,f,2g,e,f,2g");
              return std::string("Reveille:d=4,o=5,b=120:8g,8g,8g,8c,8e,8g,2c6,8e,8g,2c6,8e,8g,8c6,8e6,8d6,8c6,8d6,8e6,8c6,8g,8e,2c");

# ── Scripts ────────────────────────────────────────────────
script:
  # Alarm-Timeout: nach 5min automatisch stoppen (Überschlafen verhindern).
  - id: alarm_timeout_script
    mode: restart
    then:
      - delay: 5min
      - lambda: |-
          id(alarm_ringing) = false;
          id(alarm_enabled) = false;
      - rtttl.stop:
      - lvgl.page.show: analog_clock_page

  # Snooze: Alarm pausieren, nach 5min erneut klingeln.
  - id: snooze_action
    mode: restart
    then:
      - rtttl.stop:
      - lambda: 'id(alarm_ringing) = false;'
      - lvgl.page.show: analog_clock_page
      - delay: 5min
      - lambda: 'id(alarm_ringing) = true;'
      - rtttl.play: !lambda |-
          if (id(alarm_melody_name) == "Entertainer")
            return std::string("Entertainer:d=4,o=5,b=140:8d,8d#,8e,c,8e,c,8e,2b.,8c6,8c6,8c6,2a.,8b.,8a,8g,8a,8b,a,8a.,8g,8f#,8e,8d,2g,p");
          if (id(alarm_melody_name) == "Frere Jacques")
            return std::string("FrereJacques:d=4,o=5,b=126:c,d,e,c,c,d,e,c,e,f,2g,e,f,2g");
          return std::string("Reveille:d=4,o=5,b=120:8g,8g,8g,8c,8e,8g,2c6,8e,8g,2c6,8e,8g,8c6,8e6,8d6,8c6,8g,8e,2c");
      - lvgl.page.show: alarm_ringing_page
      - script.execute: alarm_timeout_script

  # Alarm vollständig beenden und zur Uhr zurückspringen.
  - id: alarm_stop_action
    mode: single
    then:
      - rtttl.stop:
      - lambda: |-
          id(alarm_ringing) = false;
          id(alarm_enabled) = false;
      - lvgl.page.show: analog_clock_page

  # Display nach 2min Inaktivität ausschalten.
  - id: display_sleep_timer
    mode: restart
    then:
      - delay: 2min
      - lvgl.page.show: analog_clock_page
      - light.turn_off: backlight
      - globals.set:
          id: display_sleeping
          value: 'true'

  # Analogzeiger auf aktuelle Zeit setzen.
  - id: analog_time_update
    then:
      - lvgl.indicator.update:
          id: minute_hand
          value: !lambda 'return id(sntp_time).now().minute;'
      - lvgl.indicator.update:
          id: hour_hand
          value: !lambda |-
            auto now = id(sntp_time).now();
            return std::fmod(now.hour, 12) * 60 + now.minute;

  # Zeiger-Design anwenden (Farbe und Breite je nach Auswahl).
  - id: hand_style_apply
    then:
      - lambda: |-
          lv_meter_indicator_t* min_ind = id(minute_hand);
          lv_meter_indicator_t* hr_ind  = id(hour_hand);
          if (id(hand_style_name) == "Klassisch") {
            min_ind->type_data.needle_line.width = 3;
            min_ind->type_data.needle_line.color = lv_color_hex(0x000000);
            hr_ind->type_data.needle_line.width  = 5;
            hr_ind->type_data.needle_line.color  = lv_color_hex(0x000000);
          } else if (id(hand_style_name) == "Weiss") {
            min_ind->type_data.needle_line.width = 5;
            min_ind->type_data.needle_line.color = lv_color_hex(0xFFFFFF);
            hr_ind->type_data.needle_line.width  = 8;
            hr_ind->type_data.needle_line.color  = lv_color_hex(0xFFFFFF);
          } else if (id(hand_style_name) == "Rot") {
            min_ind->type_data.needle_line.width = 3;
            min_ind->type_data.needle_line.color = lv_color_hex(0xFF3333);
            hr_ind->type_data.needle_line.width  = 6;
            hr_ind->type_data.needle_line.color  = lv_color_hex(0xFF3333);
          } else if (id(hand_style_name) == "Gold") {
            min_ind->type_data.needle_line.width = 3;
            min_ind->type_data.needle_line.color = lv_color_hex(0xFFAA00);
            hr_ind->type_data.needle_line.width  = 6;
            hr_ind->type_data.needle_line.color  = lv_color_hex(0xFFAA00);
          } else if (id(hand_style_name) == "Neon") {
            min_ind->type_data.needle_line.width = 4;
            min_ind->type_data.needle_line.color = lv_color_hex(0x00FF88);
            hr_ind->type_data.needle_line.width  = 7;
            hr_ind->type_data.needle_line.color  = lv_color_hex(0x00FF88);
          }
          lv_obj_invalidate(id(analog_meter));

# ── Zeitquelle ─────────────────────────────────────────────
time:
  - platform: homeassistant
    id: sntp_time
    timezone: "Europe/Berlin"
    on_time_sync:
      then:
        - logger.log: "NTP-Zeit synchronisiert"
        - script.execute: analog_time_update
    on_time:
      # Jede Minute: Alarm prüfen + Zeiger aktualisieren
      - seconds: 0
        minutes: /1
        then:
          - lambda: |-
              if (id(alarm_ringing)) return;
              auto now = id(sntp_time).now();
              if (!now.is_valid()) return;
              bool day_ok = !id(weekday_only) || (now.day_of_week >= 2 && now.day_of_week <= 6);
              if (id(alarm_enabled) && day_ok &&
                  now.hour == id(alarm_hour) && now.minute == id(alarm_minute)) {
                id(alarm_ringing) = true;
                id(alarm_timeout_script).execute();
              }
          - if:
              condition:
                lambda: 'return id(alarm_ringing);'
              then:
                - rtttl.play: !lambda |-
                    if (id(alarm_melody_name) == "Entertainer")
                      return std::string("Entertainer:d=4,o=5,b=140:8d,8d#,8e,c,8e,c,8e,2b.,8c6,8c6,8c6,2a.,8b.,8a,8g,8a,8b,a,8a.,8g,8f#,8e,8d,2g,p");
                    if (id(alarm_melody_name) == "Frere Jacques")
                      return std::string("FrereJacques:d=4,o=5,b=126:c,d,e,c,c,d,e,c,e,f,2g,e,f,2g");
                    return std::string("Reveille:d=4,o=5,b=120:8g,8g,8g,8c,8e,8g,2c6,8e,8g,2c6,8e,8g,8c6,8e6,8d6,8c6,8g,8e,2c");
                - lvgl.page.show: alarm_ringing_page
          - if:
              condition:
                lvgl.page.is_showing: analog_clock_page
              then:
                - script.execute: analog_time_update
          - if:
              condition:
                lvgl.page.is_showing: alarm_ringing_page
              then:
                - lvgl.label.update:
                    id: ringing_time_label
                    text: !lambda |-
                      static char buf[8];
                      auto now = id(sntp_time).now();
                      snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
                      return buf;

# ── LVGL UI ────────────────────────────────────────────────
lvgl:
  displays:
    - my_display
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 600ms
      long_press_repeat_time: 65535ms
  buffer_size: 25%
  pages:

    # ----------------------------------------------------------
    # Seite 1: Alarm-Einstellungen
    # Zugang: Long-Press auf Alarm-Label der Hauptseite
    # ----------------------------------------------------------
    - id: alarm_settings_page
      bg_color: 0xFFFFFF
      widgets:
        - label:
            id: settings_header_label
            align: TOP_MID
            y: 70
            text_font: montserrat_24
            text_color: 0x000000
            text: "Alarm einstellen"

        - label:
            id: hour_value_label
            align: CENTER
            x: -80
            y: -30
            text_font: montserrat_36
            text_color: 0x000000
            text: !lambda |-
              static char buf[4];
              snprintf(buf, sizeof(buf), "%02d", id(alarm_hour));
              return buf;

        - label:
            id: colon_label
            align: CENTER
            x: 0
            y: -30
            text_font: montserrat_36
            text_color: 0x000000
            text: ":"

        - label:
            id: minute_value_label
            align: CENTER
            x: 80
            y: -30
            text_font: montserrat_36
            text_color: 0x000000
            text: !lambda |-
              static char buf[4];
              snprintf(buf, sizeof(buf), "%02d", id(alarm_minute));
              return buf;

        - button:
            id: hour_plus_btn
            align: CENTER
            x: -80
            y: -90
            width: 80
            height: 60
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lambda: 'id(alarm_hour) = (id(alarm_hour) + 1) % 24;'
              - lvgl.label.update:
                  id: hour_value_label
                  text: !lambda |-
                    static char buf[4];
                    snprintf(buf, sizeof(buf), "%02d", id(alarm_hour));
                    return buf;
              - component.update: alarm_time
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "+"

        - button:
            id: hour_minus_btn
            align: CENTER
            x: -80
            y: 30
            width: 80
            height: 60
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lambda: 'id(alarm_hour) = (id(alarm_hour) + 23) % 24;'
              - lvgl.label.update:
                  id: hour_value_label
                  text: !lambda |-
                    static char buf[4];
                    snprintf(buf, sizeof(buf), "%02d", id(alarm_hour));
                    return buf;
              - component.update: alarm_time
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "-"

        - button:
            id: minute_plus_btn
            align: CENTER
            x: 80
            y: -90
            width: 80
            height: 60
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lambda: 'id(alarm_minute) = (id(alarm_minute) + 5) % 60;'
              - lvgl.label.update:
                  id: minute_value_label
                  text: !lambda |-
                    static char buf[4];
                    snprintf(buf, sizeof(buf), "%02d", id(alarm_minute));
                    return buf;
              - component.update: alarm_time
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "+"

        - button:
            id: minute_minus_btn
            align: CENTER
            x: 80
            y: 30
            width: 80
            height: 60
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lambda: 'id(alarm_minute) = (id(alarm_minute) + 55) % 60;'
              - lvgl.label.update:
                  id: minute_value_label
                  text: !lambda |-
                    static char buf[4];
                    snprintf(buf, sizeof(buf), "%02d", id(alarm_minute));
                    return buf;
              - component.update: alarm_time
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "-"

        - label:
            align: CENTER
            x: -55
            y: 98
            text_font: montserrat_24
            text_color: 0x000000
            text: "Mo-Fr"

        - button:
            id: weekday_toggle_btn
            align: CENTER
            x: 60
            y: 98
            width: 90
            height: 46
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - if:
                  condition:
                    lambda: 'return id(weekday_only);'
                  then:
                    - switch.turn_off: weekday_only_switch
                  else:
                    - switch.turn_on: weekday_only_switch
            widgets:
              - label:
                  id: weekday_btn_label
                  align: CENTER
                  text_font: montserrat_22
                  text_color: 0xFFFFFF
                  text: "AN"

        - button:
            id: settings_back_btn
            align: BOTTOM_MID
            y: -50
            width: 200
            height: 56
            bg_color: 0x1A1A2E
            border_width: 0
            on_short_click:
              - lvgl.label.update:
                  id: analog_alarm_label
                  text: !lambda |-
                    static char buf[32];
                    if (id(alarm_enabled)) {
                      snprintf(buf, sizeof(buf), "#FFAA00 " LV_SYMBOL_BELL "# %02d:%02d",
                               id(alarm_hour), id(alarm_minute));
                    } else {
                      snprintf(buf, sizeof(buf), "#000000 " LV_SYMBOL_BELL "# %02d:%02d",
                               id(alarm_hour), id(alarm_minute));
                    }
                    return buf;
              - lvgl.page.show: analog_clock_page
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "OK"

    # ----------------------------------------------------------
    # Seite 2: Alarm klingelt
    # Zeigt Snooze (5min) und Stopp
    # ----------------------------------------------------------
    - id: alarm_ringing_page
      bg_color: 0x1A1A2E
      widgets:
        - obj:
            id: alarm_ringing_bg
            width: 480
            height: 480
            align: CENTER
            bg_color: 0x1A1A2E
            border_width: 0
            pad_all: 0
            clickable: false
        - label:
            id: ringing_header_label
            align: CENTER
            y: -100
            text_font: montserrat_48
            text_color: 0xFFFFFF
            text: "ALARM"

        - label:
            id: ringing_time_label
            align: CENTER
            y: -40
            text_font: montserrat_36
            text_color: 0xFFAA00
            text: !lambda |-
              static char buf[8];
              auto now = id(sntp_time).now();
              if (now.is_valid())
                snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
              else
                snprintf(buf, sizeof(buf), "--:--");
              return buf;

        - button:
            id: snooze_btn
            align: CENTER
            x: -90
            y: 80
            width: 160
            height: 80
            bg_color: 0xFFAA00
            border_width: 0
            on_short_click:
              - logger.log: "TOUCH: snooze_btn geklickt"
              - script.execute: snooze_action
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0x000000
                  text: "Snooze 5min"

        - button:
            id: stopp_btn
            align: CENTER
            x: 90
            y: 80
            width: 140
            height: 80
            bg_color: 0xFF3333
            border_width: 0
            on_short_click:
              - logger.log: "TOUCH: stopp_btn geklickt"
              - script.execute: alarm_stop_action
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_24
                  text_color: 0xFFFFFF
                  text: "Stopp"

    # ----------------------------------------------------------
    # Seite 3: Analoge Uhr (Hauptseite)
    # Tap auf Alarm-Label: Alarm ein/aus
    # Tap auf Zahnrad: Einstellungsseite
    # ----------------------------------------------------------
    - id: analog_clock_page
      widgets:
        - obj:
            id: analog_clock_bg
            width: 480
            height: 480
            align: CENTER
            bg_color: 0xFF69B4
            border_width: 0
            pad_all: 0
            widgets:
              - meter:
                  id: analog_meter
                  height: 480
                  width: 480
                  align: CENTER
                  bg_opa: TRANSP
                  border_width: 0
                  text_color: 0x000000
                  text_font: montserrat_48
                  scales:
                    # Minutenskala (0–60)
                    - range_from: 0
                      range_to: 60
                      angle_range: 360
                      rotation: 270
                      ticks:
                        width: 1
                        count: 61
                        length: 10
                        color: 0x000000
                      indicators:
                        - line:
                            id: minute_hand
                            width: 3
                            color: 0x000000
                            r_mod: -4
                            value: 0
                    # Stundenzahlen (1–12)
                    - range_from: 1
                      range_to: 12
                      angle_range: 330
                      rotation: 300
                      ticks:
                        width: 1
                        count: 12
                        length: 1
                        major:
                          stride: 1
                          width: 4
                          length: 10
                          color: 0x000000
                          label_gap: 40
                    # Stundenskala (0–720 = 12h × 60min)
                    - range_from: 0
                      range_to: 720
                      angle_range: 360
                      rotation: 270
                      ticks:
                        count: 0
                      indicators:
                        - line:
                            id: hour_hand
                            width: 5
                            color: 0x000000
                            r_mod: -50
                            value: 0
              # Alarm-Label: Tap = ein/aus
              - button:
                  id: analog_alarm_btn
                  width: 154
                  height: 54
                  align: CENTER
                  y: 90
                  bg_opa: 0%
                  border_width: 0
                  shadow_width: 0
                  on_short_click:
                    - lambda: 'id(alarm_enabled) = !id(alarm_enabled);'
                    - lvgl.label.update:
                        id: analog_alarm_label
                        text: !lambda |-
                          static char buf[32];
                          if (id(alarm_enabled)) {
                            snprintf(buf, sizeof(buf), "#FFAA00 " LV_SYMBOL_BELL "# %02d:%02d",
                                     id(alarm_hour), id(alarm_minute));
                          } else {
                            snprintf(buf, sizeof(buf), "#000000 " LV_SYMBOL_BELL "# %02d:%02d",
                                     id(alarm_hour), id(alarm_minute));
                          }
                          return buf;
                  widgets:
                    - label:
                        id: analog_alarm_label
                        align: CENTER
                        text_font: montserrat_28
                        text_color: 0x000000
                        recolor: true
                        text: !lambda |-
                          static char buf[32];
                          if (id(alarm_enabled)) {
                            snprintf(buf, sizeof(buf), "#FFAA00 " LV_SYMBOL_BELL "# %02d:%02d",
                                     id(alarm_hour), id(alarm_minute));
                          } else {
                            snprintf(buf, sizeof(buf), "#000000 " LV_SYMBOL_BELL "# %02d:%02d",
                                     id(alarm_hour), id(alarm_minute));
                          }
                          return buf;
              # Zahnrad-Icon: Tap öffnet Einstellungsseite
              - button:
                  id: settings_icon_btn
                  align: CENTER
                  y: -90
                  width: 50
                  height: 50
                  bg_opa: 0%
                  border_width: 0
                  shadow_width: 0
                  on_short_click:
                    - lvgl.page.show: alarm_settings_page
                  widgets:
                    - label:
                        align: CENTER
                        text_font: montserrat_24
                        text_color: 0x000000
                        text: !lambda 'return std::string(LV_SYMBOL_SETTINGS);'

              # Mo-Fr Anzeige unter dem Alarm-Label
              - label:
                  id: weekday_label
                  align: CENTER
                  y: 127
                  text_font: montserrat_22
                  text_color: 0x000000
                  text: !lambda |-
                    return std::string(id(weekday_only) ? "Mo-Fr" : "");
